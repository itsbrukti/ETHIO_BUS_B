<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EthioGo | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        /* Login Page Specific Styles */
        .login-wrapper {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 3.5rem;
            color: #e67e22;
            margin-bottom: 1rem;
        }

        .login-header h2 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1a1a2e;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: #94a3b8;
            font-size: 1rem;
            z-index: 1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
            background: white;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1rem;
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #e67e22;
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #e67e22;
        }

        .forgot-link {
            color: #e67e22;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #d35400;
            text-decoration: underline;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(230, 126, 34, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .register-link p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .register-link a {
            color: #e67e22;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .register-link a:hover {
            color: #d35400;
            text-decoration: underline;
        }

        /* Alert Messages */
        .alert {
            padding: 0.875rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .alert i {
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-wrapper {
                padding: 2rem 1rem;
            }
            
            .login-card {
                padding: 1.5rem;
            }
            
            .login-header h2 {
                font-size: 1.5rem;
            }
            
            .form-options {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>
    
    <!-- Login Wrapper -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-bus"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to continue your journey</p>
            </div>
            
            <div id="alertMessage" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="youremail@gmail.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye-slash password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn">Sign In</button>
                
                <div class="register-link">
                    <p>Don't have an account? <a href="register.html">Create Account</a></p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>
    
    <script src="js/main.js"></script>
    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Login page loaded');
            
            // DOM Elements
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const rememberMeCheckbox = document.getElementById('rememberMe');
            const alertMessageDiv = document.getElementById('alertMessage');
            
            // ========================================
            // PASSWORD TOGGLE
            // ========================================
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                    this.classList.toggle('fa-eye');
                });
            }
            
            // ========================================
            // COOKIE FUNCTIONS
            // ========================================
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            }
            
            function setCookie(name, value, days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`;
            }
            
            // ========================================
            // LOAD SAVED EMAIL
            // ========================================
            function loadSavedEmail() {
                const savedEmail = getCookie('user_email');
                if (savedEmail && emailInput) {
                    emailInput.value = savedEmail;
                    if (rememberMeCheckbox) {
                        rememberMeCheckbox.checked = true;
                    }
                }
            }
            
            // ========================================
            // SHOW ALERT
            // ========================================
            function showAlert(message, type) {
                if (alertMessageDiv) {
                    const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
                    alertMessageDiv.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
                    alertMessageDiv.className = `alert alert-${type}`;
                    alertMessageDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        alertMessageDiv.style.display = 'none';
                    }, 4000);
                } else {
                    alert(message);
                }
            }
            
            // ========================================
            // FORM SUBMISSION
            // ========================================
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = emailInput ? emailInput.value.trim() : '';
                    const password = passwordInput ? passwordInput.value : '';
                    const rememberMe = rememberMeCheckbox ? rememberMeCheckbox.checked : false;
                    
                    console.log('Submitting login for:', email);
                    
                    if (!email || !password) {
                        showAlert('Please enter both email and password', 'error');
                        return;
                    }
                    
                    // Show loading state
                    const submitBtn = loginForm.querySelector('button');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Signing in...';
                    submitBtn.disabled = true;
                    
                    try {
                        const response = await fetch('backend/api/login.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                email: email,
                                password: password,
                                rememberMe: rememberMe
                            })
                        });
                        
                        const result = await response.json();
                        console.log('Response:', result);
                        
                        if (result.success) {
                            showAlert(result.message, 'success');
                            
                            if (rememberMe) {
                                setCookie('user_email', email, 30);
                            }
                            
                            setTimeout(() => {
                                window.location.href = result.redirect;
                            }, 1500);
                        } else {
                            showAlert(result.message, 'error');
                            submitBtn.textContent = originalText;
                            submitBtn.disabled = false;
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        showAlert('Connection error: ' + error.message, 'error');
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                });
            }
            
            // Load saved email
            loadSavedEmail();
        });
    </script>
</body>
</html>
